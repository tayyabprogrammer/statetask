name: Build and Test on macOS (iOS toolchain)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual run from the Actions tab

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install qtpy pyside6

      - name: Verify Qt/PySide6 environment
        run: |
          python3 -c "
          import os
          os.environ['QT_API'] = 'pyside6'
          from qtpy.QtWidgets import QApplication
          from qtpy.QtCore import Qt
          print('PySide6 backend loaded successfully on macOS')
          print('Qt.AlignCenter value:', Qt.AlignCenter)
          "

      - name: Run app logic test (offscreen, no display needed)
        run: |
          QT_QPA_PLATFORM=offscreen python3 -c "
          import os
          os.environ['QT_API'] = 'pyside6'
          import main

          app_test = main.QApplication([])
          w = main.MainWindow()

          assert type(w.currentWidget()).__name__ == 'SplashScreen'
          print('Splash screen loads correctly')

          w.show_login()
          assert type(w.currentWidget()).__name__ == 'LoginScreen'
          print('Login screen loads correctly')

          w.show_signup()
          assert type(w.currentWidget()).__name__ == 'SignupScreen'
          print('Signup screen loads correctly')

          print('ALL TESTS PASSED on macOS runner (iOS toolchain available on this OS)')
          "

      - name: Confirm Xcode / iOS toolchain availability
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep iPhone | head -5
