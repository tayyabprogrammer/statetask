name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java (required by Android build tools)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install PySide6 and deployment dependencies
        run: |
          pip install pyside6==6.11.1
          pip install jinja2 pkginfo tqdm "packaging==24.1"
          pip install buildozer cython

      - name: Download official PySide6/Shiboken6 Android wheels
        run: |
          mkdir -p android_wheels
          cd android_wheels
          curl -L -O "https://download.qt.io/official_releases/QtForPython/pyside6/pyside6-6.11.1-6.11.1-cp311-cp311-android_aarch64.whl"
          curl -L -O "https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.11.1-6.11.1-cp311-cp311-android_aarch64.whl"
          ls -la

      - name: Run pyside6-android-deploy to build APK
        run: |
          pyside6-android-deploy \
            --wheel-pyside=android_wheels/pyside6-6.11.1-6.11.1-cp311-cp311-android_aarch64.whl \
            --wheel-shiboken=android_wheels/shiboken6-6.11.1-6.11.1-cp311-cp311-android_aarch64.whl \
            --name "StudentApp" \
            -f

      - name: Locate and rename APK
        run: |
          find . -name "*.apk" -exec cp {} ./StudentApp.apk \;
          ls -la *.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudentApp-apk
          path: StudentApp.apk
